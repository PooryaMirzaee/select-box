# =============================================================================
# Nginx — نمونهٔ Reverse Proxy برای یک دامنه واحد
# -----------------------------------------------------------------------------
# فرض: Next.js روی میزبان در پورت 3000 و FastAPI در 8000 اجرا می‌شوند.
# در Docker، به‌جای host.docker.internal از نام سرویس شبکهٔ compose استفاده کنید.
#
# مسیر /api/ به بک‌اند؛ بقیه به فرانت. برای WebSocket در Next معمولاً هدر Upgrade لازم است.
# =============================================================================

upstream next_upstream {
    server host.docker.internal:3000;
}

upstream api_upstream {
    server host.docker.internal:8000;
}

server {
    listen 80;
    server_name localhost;

    # تمام درخواست‌های REST زیر /api به FastAPI
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA / Next — مسیر پیش‌فرض
    location / {
        proxy_pass http://next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
