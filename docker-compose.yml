# =============================================================================
# Docker Compose — توسعهٔ لوکال پروژه SelectBox
# -----------------------------------------------------------------------------
# سرویس‌ها: PostgreSQL (دادهٔ رابطه‌ای)، MinIO (ذخیرهٔ آبجکت مشابه S3)
# دیپلوی تولید: ./scripts/deploy.sh  — راهنما: DEPLOY.md
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: selectbox-postgres
    environment:
      POSTGRES_USER: selectbox
      POSTGRES_PASSWORD: selectbox_dev
      POSTGRES_DB: selectbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selectbox -d selectbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: selectbox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: selectboxminio
      MINIO_ROOT_PASSWORD: selectboxminio_dev_change_me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
